<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>CRUD Vehículos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body>
    <div class="banner">

    <img src="img/banner.jpg"
         alt="Vehículos">

    <div class="banner-text">

        <h1>Sistema de Gestión de Vehículos</h1>

        <p>Registro, edición y control de inventario</p>

    </div>

</div>

<div class="container mt-4">

<h1 class="text-center mb-4">
Registro de Vehículos
</h1>

<form id="vehiculoForm">

<div class="row">

<div class="col-md-4">
<input class="form-control" id="codigo"
placeholder="Código" required>
</div>

<div class="col-md-4">
<input class="form-control" id="marca"
placeholder="Marca" required>
</div>

<div class="col-md-4">
<input class="form-control" id="modelo"
placeholder="Modelo" required>
</div>

</div>

<br>

<div class="row">

<div class="col-md-3">
<input class="form-control" type="number"
id="anio" placeholder="Año" required>
</div>

<div class="col-md-3">
<input class="form-control" id="color"
placeholder="Color" required>
</div>

<div class="col-md-3">

<select class="form-control"
id="combustible">

<option>Gasolina</option>
<option>Diésel</option>
<option>Híbrido</option>
<option>Eléctrico</option>

</select>

</div>

<div class="col-md-3">

<input class="form-control"
type="number"
id="precio"
placeholder="Precio">

</div>

</div>

<br>

<div class="row">

<div class="col-md-4">
<input class="form-control"
type="number"
id="cantidad"
placeholder="Cantidad">
</div>

<div class="col-md-8">
<textarea class="form-control"
id="descripcion"
placeholder="Descripción">
</textarea>
</div>

</div>

<br>

<button class="btn btn-primary">
Guardar Vehículo
</button>

</form>

<hr>

<h3>Listado de Vehículos</h3>

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>
<th>Código</th>
<th>Marca</th>
<th>Modelo</th>
<th>Precio</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaVehiculos">

</tbody>

</table>

</div>

<script src="script.js"></script>

</body>

</html>
